<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start Free Trial — LeedAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: #0f172a; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { color: #fff; font-weight: 800; font-size: 20px; text-decoration: none; }
    nav .logo span { color: #60a5fa; }
    nav a.signin { color: #94a3b8; text-decoration: none; font-size: 14px; }
    nav a.signin:hover { color: #fff; }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }

    .card { background: #fff; border-radius: 20px; padding: 48px; max-width: 460px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }

    .card-head { text-align: center; margin-bottom: 36px; }
    .card-head h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .card-head p { color: #64748b; font-size: 15px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 15px; color: #0f172a; background: #fff; outline: none; transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus { border-color: #2563eb; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 18px; }

    button[type=submit] {
      width: 100%; background: #2563eb; color: #fff; border: none; padding: 14px;
      border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px;
    }
    button[type=submit]:hover { background: #1d4ed8; }

    .signin-link { text-align: center; margin-top: 22px; font-size: 14px; color: #64748b; }
    .signin-link a { color: #2563eb; text-decoration: none; font-weight: 600; }

    .perks { display: flex; gap: 20px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
    .perk { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; }
    .perk span { color: #16a34a; font-weight: 700; }

    @media (max-width: 500px) {
      .card { padding: 32px 24px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Leed<span>AI</span></a>
  <a href="/login" class="signin">Already have an account? Sign in</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-head">
      <h1>Start your free trial</h1>
      <p>Set up takes 5 minutes. No credit card needed.</p>
    </div>

    <div class="perks">
      <div class="perk"><span>✓</span> 14 days free</div>
      <div class="perk"><span>✓</span> No credit card</div>
      <div class="perk"><span>✓</span> Cancel any time</div>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup">
      <div class="field-row">
        <div class="field">
          <label>Your name</label>
          <input type="text" name="owner_name" value="{{ form_data.get('owner_name', '') }}" placeholder="John Smith" required>
        </div>
        <div class="field">
          <label>Trade</label>
          <select name="trade">
            <option value="plumber" {% if form_data.get('trade') == 'plumber' %}selected{% endif %}>Plumber</option>
            <option value="electrician" {% if form_data.get('trade') == 'electrician' %}selected{% endif %}>Electrician</option>
            <option value="roofer" {% if form_data.get('trade') == 'roofer' %}selected{% endif %}>Roofer</option>
            <option value="gardener" {% if form_data.get('trade') == 'gardener' %}selected{% endif %}>Gardener</option>
            <option value="other" {% if form_data.get('trade', '') not in ['plumber','electrician','roofer','gardener'] %}selected{% endif %}>Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Business name</label>
        <input type="text" name="business_name" value="{{ form_data.get('business_name', '') }}" placeholder="Smith Plumbing Ltd" required>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" name="email" value="{{ form_data.get('email', '') }}" placeholder="john@smithplumbing.co.uk" required>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>

      <button type="submit">Create my account →</button>
    </form>

    <div class="signin-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

</body>
</html>
