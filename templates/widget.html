<!DOCTYPE html>
<html>
<head>
<style>
#chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: {{ branding.primary_color }};
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#chat-frame {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 320px;
    height: 420px;
    border: none;
    display: none;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="chat-button" onclick="toggleChat()">💬</div>

<iframe id="chat-frame"></iframe>

<script>
// 🔥 GET BUSINESS ID FROM URL
const businessId = new URLSearchParams(window.location.search).get("business");

// 🔥 SET IFRAME SOURCE CORRECTLY
const chatFrame = document.getElementById("chat-frame");

if (businessId) {
    chatFrame.src = `/chat-ui?business=${businessId}`;
} else {
    console.error("No business ID found in URL");
}

// 🔥 TOGGLE CHAT
function toggleChat() {
    if (chatFrame.style.display === "block") {
        chatFrame.style.display = "none";
    } else {
        chatFrame.style.display = "block";
    }
}
</script>

</body>
</html>
