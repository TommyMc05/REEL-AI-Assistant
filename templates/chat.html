<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #f0f2f5;
}

/* Header */
#header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

#header-avatar {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}

#header-info h3 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
}

#header-info p {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.online-dot {
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* Chat box */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
}

#chat-box::-webkit-scrollbar { width: 4px; }
#chat-box::-webkit-scrollbar-track { background: transparent; }
#chat-box::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* Message rows */
.message-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: slideIn 0.2s ease;
}

.message-row.user { flex-direction: row-reverse; }

@keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.bot-avatar {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-bottom: 2px;
}

.bubble {
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 78%;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.message-row.bot .bubble {
    background: #ffffff;
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.message-row.user .bubble {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border-bottom-right-radius: 4px;
}

.message-row.typing .bubble {
    background: #ffffff;
    color: #9ca3af;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    letter-spacing: 4px;
    font-size: 18px;
    padding: 8px 14px;
}

/* Input area */
#input-area {
    padding: 12px 14px;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}

#input {
    flex: 1;
    padding: 10px 16px;
    border: 1.5px solid #e5e7eb;
    border-radius: 24px;
    outline: none;
    font-size: 14px;
    font-family: inherit;
    background: #f9fafb;
    color: #1a1a2e;
    transition: border-color 0.15s, background 0.15s;
}

#input:focus {
    border-color: #2563eb;
    background: #fff;
}

#input:disabled { opacity: 0.6; }

#send-btn {
    width: 40px;
    height: 40px;
    min-width: 40px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.2s;
}

#send-btn:hover  { transform: scale(1.06); }
#send-btn:active { transform: scale(0.94); }
#send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

#send-btn svg { width: 17px; height: 17px; fill: white; }

/* Footer */
#footer {
    text-align: center;
    padding: 7px;
    font-size: 11px;
    color: #9ca3af;
    background: #ffffff;
    border-top: 1px solid #f3f4f6;
    flex-shrink: 0;
}

#footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
#footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="header">
    <div id="header-avatar">🤖</div>
    <div id="header-info">
        <h3>{{ business.business_name }}</h3>
        <p><span class="online-dot"></span>Online now</p>
    </div>
</div>

<div id="chat-box"></div>

<div id="input-area">
    <input id="input" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
    </button>
</div>

<div id="footer">Powered by <a href="https://leedai.co.uk" target="_blank">LeedAI</a></div>

<script>
const businessId = new URLSearchParams(window.location.search).get("business");

let userId = localStorage.getItem("chat_user_id");
if (!userId) {
    userId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("chat_user_id", userId);
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "message-row " + sender;

    if (sender === "bot" || sender === "typing") {
        const avatar = document.createElement("div");
        avatar.className = "bot-avatar";
        avatar.innerText = "🤖";
        row.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    row.appendChild(bubble);

    chatBox.appendChild(row);
    bubble.scrollIntoView({ behavior: "smooth", block: "end" });
    return row;
}

function setLoading(on) {
    document.getElementById("send-btn").disabled = on;
    document.getElementById("input").disabled = on;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    setLoading(true);

    const typing = addMessage("···", "typing");

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, message: text, business_id: businessId })
        });
        const data = await res.json();
        typing.remove();
        addMessage(data.reply, "bot");
    } catch {
        typing.remove();
        addMessage("Something went wrong. Please try again.", "bot");
    }

    setLoading(false);
    document.getElementById("input").focus();
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

(async function init() {
    setLoading(true);
    const typing = addMessage("···", "typing");
    try {
        const res = await fetch("/init", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, business_id: businessId })
        });
        const data = await res.json();
        typing.remove();
        addMessage(data.reply, "bot");
    } catch {
        typing.remove();
        addMessage("Hello! How can I help you today?", "bot");
    }
    setLoading(false);
    document.getElementById("input").focus();
})();
</script>

</body>
</html>
