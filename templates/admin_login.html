<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeedAI Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    background: #fff;
    padding: 36px;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 380px;
}
h1 { font-size: 22px; margin-bottom: 6px; color: #0f172a; }
p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 22px; }
label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 600; }
input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
}
input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
button {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}
button:hover { opacity: 0.95; }
.error {
    background: #fef2f2;
    color: #b91c1c;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
}
</style>
</head>
<body>
<div class="card">
    <h1>LeedAI Admin</h1>
    <p class="subtitle">Sign in to view your leads</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
        <label>Password</label>
        <input type="password" name="password" autofocus required>
        <button type="submit">Sign in</button>
    </form>
</div>
</body>
</html>
