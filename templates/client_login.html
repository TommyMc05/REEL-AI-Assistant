<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — LeedAI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; padding: 36px; border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 380px; }
h1 { font-size: 22px; margin-bottom: 6px; color: #0f172a; }
p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 22px; }
label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 600; margin-top: 12px; }
input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; }
input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
button { width: 100%; margin-top: 18px; padding: 12px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.error { background: #fef2f2; color: #b91c1c; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.brand { color: #2563eb; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your <span class="brand">LeedAI</span> dashboard</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
        <label>Email</label>
        <input type="email" name="login_email" autofocus required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit">Sign in</button>
    </form>
</div>
</body>
</html>
